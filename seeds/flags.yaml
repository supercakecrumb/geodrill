# Flags quiz seed data (seeds/flags.yaml)
#
# Consumed by internal/topics/flags (see vibe/design-flags-quiz.md). Data-only
# file — no Go code here. Countries are NOT re-declared: `flags[].country` and
# `confusable_groups[].countries` are ISO A2 codes (including the GB-ENG/GB-SCT/
# GB-WLS subdivision pseudo-codes) resolved against the `countries` table already
# seeded from seeds/countries.yaml. Tiers are NOT assigned here — the Go seed step
# derives tier from the shared country-tier rubric (architecture SS4) at seed time.
#
# Schema:
#
# flags:                        # ordinary single items (one country each)
#   - country: <ISO2>            # e.g. "FR", "GB-SCT" — matches seeds/countries.yaml iso_a2
#     image: <lowercase-iso2>.png # filename under the media root data/flags/ (gitignored;
#                                 # fetched by scripts/fetch-flags.sh). Relative to media root.
#
# confusable_groups:            # set-choice items — the group, not any one member, is quizzed
#   - group: <slug>              # stable machine key, used as items.key material (sorted ISO list)
#     countries: [<ISO2>, ...]    # member countries; NONE of these also appear under `flags:`
#                                 # above (design.md SS3 exclusivity rule) — no standalone single
#                                 # item for a country whose flag is only unambiguous as a group
#     images: [<lowercase-iso2>.png, ...]  # same order/length as `countries`; one PNG per member
#     label: "<human label>"      # shown in prompts/logs, e.g. "Chad / Romania"


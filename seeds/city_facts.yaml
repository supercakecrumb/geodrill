    source_url: https://en.wikipedia.org/wiki/Belo_Horizonte
    retrieved: "2026-07-20"
  - key: br:brasilia
    blurb: Brasília is the capital city of Brazil and the Federal District. Located in the Brazilian Highlands in the country's Central-West region, it was founded by President Juscelino Kubitschek on 21 April 1960, to replace Rio de Janeiro as the national capital.

    source_url: https://en.wikipedia.org/wiki/Bras%C3%ADlia
    wikidata: Q2844
    retrieved: "2026-07-20"
  - key: br:campinas
    blurb: Campinas is a city in the Brazilian state of São Paulo, located 84 kilometers northwest of the city of São Paulo. As of 2024, the city's population is estimated at 1,185,977, making it the fourteenth most populous Brazilian city and the third most populous in São Paulo state.
    source_title: Campinas
    source_url: https://en.wikipedia.org/wiki/Campinas
    retrieved: "2026-07-20"
  - key: br:curitiba
    blurb: Curitiba is the capital and largest city in the state of Paraná in Southern Brazil. The city's population was 1,829,225 as of 2024, making it the eighth most populous city in Brazil and the largest in Brazil's South Region.

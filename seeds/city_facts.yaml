  - key: br:belem
    blurb: Belém, often called Belém of Pará, is the capital and largest city of the state of Pará in the north of Brazil. It is the gateway to the Amazon River with a busy port, airport, and bus/coach station.
    source_title: Belém
    source_url: https://en.wikipedia.org/wiki/Bel%C3%A9m
    retrieved: "2026-07-20"
  - key: br:belo-horizonte
    blurb: Belo Horizonte is the sixth-largest city in Brazil, with a population of around 2.4 million, and the third largest metropolitan area, containing a population of 6 million. It is the 13th-largest city in South America and the 18th-largest in the Americas.

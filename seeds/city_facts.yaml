    source_title: Maceió
    source_url: https://en.wikipedia.org/wiki/Macei%C3%B3
    retrieved: "2026-07-20"
  - key: br:manaus
    blurb: Manaus is the capital and largest city of the Brazilian state of Amazonas. It is the seventh-largest city in Brazil, with an estimated 2024 population of 2,279,686 distributed over a land area of about 11,401 km2 (4,402 sq mi).
    source_title: Manaus
    source_url: https://en.wikipedia.org/wiki/Manaus
    retrieved: "2026-07-20"
  - key: br:porto-alegre
    blurb: Porto Alegre is the capital and largest city of the Brazilian state of Rio Grande do Sul. Its population of roughly 1.4 million inhabitants (2022) makes it the 11th-most populous city in the country and the centre of Brazil's fifth-largest metropolitan area, with 4.1 million inhabitants (2022).
    source_title: Porto Alegre
    source_url: https://en.wikipedia.org/wiki/Porto_Alegre
    retrieved: "2026-07-20"
  - key: br:recife

    source_title: Goiânia
    source_url: https://en.wikipedia.org/wiki/Goi%C3%A2nia
    retrieved: "2026-07-20"
  - key: br:guarulhos
    blurb: Guarulhos is a city and municipality located in the Metropolitan Region of São Paulo, São Paulo state, Brazil. It is located northeast of the state capital, São Paulo.
    source_title: Guarulhos
    source_url: https://en.wikipedia.org/wiki/Guarulhos
    retrieved: "2026-07-20"
  - key: br:maceio

# seeds/city_facts.yaml — one-paragraph landmark/fact blurbs for the
# higher-tier cities in seeds/cities.yaml, later folded into the "city
# discovered" intro card for tier 0-2 cities.
#
# Blurbs are Wikipedia page-summary extracts (the lead paragraph, via the
# REST API /page/summary/<title> endpoint) and are licensed
# CC BY-SA 4.0 (https://creativecommons.org/licenses/by-sa/4.0/) — reusing
# this text REQUIRES attribution, carried per-entry via source_url (a link
# to the exact Wikipedia article each blurb came from).
#
# Cities are matched to a Wikipedia article primarily via Wikidata (CC0,
# https://www.wikidata.org/), batched SPARQL joining on the GeoNames ID
# already recorded in seeds/cities.yaml (property P1566). Cities with no
# geoname_id, or no Wikidata hit, fall back to Wikipedia's GeoSearch API by
# coordinates.
#
# Regenerate (adds new cities; -force re-scrapes existing keys) with:
#   go run ./cmd/cityfacts
#
# Schema:
#   key: matches the city's key in seeds/cities.yaml
#   blurb: trimmed Wikipedia summary extract (<=2 sentences, <=350 chars)
#   source_title: the matched Wikipedia article title
#   source_url: the matched Wikipedia article URL (attribution link)
#   wikidata: the matched Wikidata QID, when captured
#   retrieved: UTC date (YYYY-MM-DD) the blurb was fetched
facts:
  - key: ae:abu-dhabi
    blurb: Abu Dhabi is the capital city of the United Arab Emirates (UAE). The city is the seat of the Abu Dhabi Central Capital District, the capital city of the Emirate of Abu Dhabi, and the UAE's second-most populous city, after Dubai.
    source_title: Abu Dhabi
    source_url: https://en.wikipedia.org/wiki/Abu_Dhabi
    wikidata: Q1519
    retrieved: "2026-07-20"
  - key: ae:dubai
    blurb: Dubai is the most populous city in the United Arab Emirates and the capital of the Emirate of Dubai. It is on a creek on the southeastern coast of the Persian Gulf.
    source_title: Dubai
    source_url: https://en.wikipedia.org/wiki/Dubai
    wikidata: Q612
    retrieved: "2026-07-20"
  - key: ae:sharjah
    blurb: Sharjah is a major port city and the third-most populous city in the United Arab Emirates, after Dubai and Abu Dhabi. It is the capital of the Emirate of Sharjah and forms part of the Dubai-Sharjah-Ajman metropolitan area.
    source_title: Sharjah
    source_url: https://en.wikipedia.org/wiki/Sharjah
    wikidata: Q289693
    retrieved: "2026-07-20"
  - key: af:kabul
    blurb: Kabul is the capital and largest city of Afghanistan. It is within the jurisdiction of Kabul District and has an estimated population of 5,333,284 people.
    source_title: Kabul
    source_url: https://en.wikipedia.org/wiki/Kabul
    wikidata: Q5838
    retrieved: "2026-07-20"
  - key: am:yerevan
    blurb: Yerevan is the capital and largest city of Armenia, as well as one of the world's oldest continuously inhabited cities. Situated along the Hrazdan River, Yerevan is the administrative, cultural, and industrial centre of the country, as its primate city.
    source_title: Yerevan
    source_url: https://en.wikipedia.org/wiki/Yerevan
    retrieved: "2026-07-20"
  - key: ao:luanda
    blurb: Luanda is the capital and largest city of Angola. It is Angola's primary port, and its major industrial, cultural and urban centre.
    source_title: Luanda
    source_url: https://en.wikipedia.org/wiki/Luanda
    wikidata: Q3897
    retrieved: "2026-07-20"
  - key: ar:buenos-aires
    blurb: Buenos Aires, officially the Autonomous City of Buenos Aires, is the capital and largest city of Argentina. It is located on the southwest of the Río de la Plata.
    source_title: Buenos Aires
    source_url: https://en.wikipedia.org/wiki/Buenos_Aires
    wikidata: Q1486
    retrieved: "2026-07-20"
  - key: ar:cordoba
    blurb: Córdoba is a city in central Argentina, in the foothills of the Sierras Chicas on the Suquía River, about 700 km (435 mi) northwest of Buenos Aires. It is the capital of Córdoba Province and the second-most populous city in Argentina after Buenos Aires, with about 1.6 million urban inhabitants according to the 2020 census.
    source_title: Córdoba, Argentina
    source_url: https://en.wikipedia.org/wiki/C%C3%B3rdoba%2C_Argentina
    wikidata: Q44210
    retrieved: "2026-07-20"
  - key: at:vienna
    blurb: Vienna is the capital, most populous city, and one of the nine states of Austria. It is Austria's primate city, with just over two million inhabitants.
    source_title: Vienna
    source_url: https://en.wikipedia.org/wiki/Vienna
    wikidata: Q1741
    retrieved: "2026-07-20"
  - key: au:adelaide
    blurb: Adelaide is the capital and most populous city of South Australia, as well as the fifth-most populous city in Australia. The name "Adelaide" may refer to either Greater Adelaide or the Adelaide city centre; the demonym Adelaidean is used to denote the city and the residents of Adelaide.
    source_title: Adelaide
    source_url: https://en.wikipedia.org/wiki/Adelaide
    wikidata: Q5112
    retrieved: "2026-07-20"
  - key: au:brisbane
    blurb: Brisbane is the capital and largest city of the Australian state of Queensland and the third-most populous city in Australia, with a population of approximately 2.8 million. Brisbane lies at the centre of South East Queensland, a bio-geographical and urban region with an estimated population of 4.1 million as of 2024.
    source_title: Brisbane
    source_url: https://en.wikipedia.org/wiki/Brisbane
    wikidata: Q34932
    retrieved: "2026-07-20"
  - key: au:melbourne
    blurb: Melbourne is the capital and most populous city of the Australian state of Victoria and the second-most populous city in Australia. The city's name generally refers to a 9,993-square-kilometre (3,858 sq mi) area, comprising an urban agglomeration of 31 local government areas.
    source_title: Melbourne
    source_url: https://en.wikipedia.org/wiki/Melbourne
    wikidata: Q3141
    retrieved: "2026-07-20"
  - key: au:perth
    blurb: Perth is the capital city of Western Australia. It is the fourth-most-populous city in Australia, with a population of over 2.3 million within Greater Perth as of 2023.
    source_title: Perth
    source_url: https://en.wikipedia.org/wiki/Perth
    wikidata: Q3183
    retrieved: "2026-07-20"
  - key: au:sydney
    blurb: Sydney is the capital city of the state of New South Wales, and the most populous city in Australia.
    source_title: Sydney
    source_url: https://en.wikipedia.org/wiki/Sydney
    wikidata: Q3130
    retrieved: "2026-07-20"
  - key: az:baku
    blurb: Baku is the capital and largest city of Azerbaijan, as well as the largest city on the Caspian Sea and in the Caucasus region. Baku is 28 metres (92 ft) below sea level, which makes it the lowest lying national capital in the world and the largest city in the world below sea level.
    source_title: Baku
    source_url: https://en.wikipedia.org/wiki/Baku
    retrieved: "2026-07-20"
  - key: bd:chittagong
    blurb: Chittagong, officially Chattogram, is the second-largest city in Bangladesh and the largest city in the Greater Chittagong region. Home to the Port of Chittagong, it is the busiest port in Bangladesh and the Bay of Bengal.
    source_title: Chittagong
    source_url: https://en.wikipedia.org/wiki/Chittagong
    wikidata: Q376749
    retrieved: "2026-07-20"
  - key: bd:dhaka
    blurb: Dhaka, formerly known as Dacca, is the capital and largest city of Bangladesh. With an estimated population of 36.6 million, Dhaka is the second largest city by population in the world, and is widely considered to be the most densely populated built-up urban area in the world.
    source_title: Dhaka
    source_url: https://en.wikipedia.org/wiki/Dhaka
    wikidata: Q1354
    retrieved: "2026-07-20"
  - key: bd:gazipur
    blurb: Gazipur is a city in central Bangladesh. Located in Gazipur District in Dhaka Division, it is a major industrial city 25 km (16 mi) north of Dhaka.
    source_title: Gazipur
    source_url: https://en.wikipedia.org/wiki/Gazipur
    retrieved: "2026-07-20"
  - key: bd:khulna
    blurb: Khulna is the third-largest city in Bangladesh, after Dhaka and Chittagong. It is the administrative centre of the Khulna District and the Khulna Division.
    source_title: Khulna
    source_url: https://en.wikipedia.org/wiki/Khulna
    wikidata: Q243325
    retrieved: "2026-07-20"
  - key: bd:rangpur
    blurb: Rangpur is a major metropolitan city in Bangladesh. This city serves as the administrative center of the Rangpur Division.
    source_title: Rangpur, Bangladesh
    source_url: https://en.wikipedia.org/wiki/Rangpur%2C_Bangladesh
    wikidata: Q994514
    retrieved: "2026-07-20"
  - key: be:brussels
    blurb: The City of Brussels is the largest municipality and historical centre of the Brussels-Capital Region, as well as the capital of the French Community of Belgium, the Flemish Region, and Belgium. The City of Brussels is also the administrative centre of the European Union, as it hosts a number of principal EU institutions in its European Quarter.
    source_title: City of Brussels
    source_url: https://en.wikipedia.org/wiki/City_of_Brussels
    wikidata: Q239
    retrieved: "2026-07-20"
  - key: bf:ouagadougou
    blurb: Ouagadougou or Wagadugu is the capital and largest city of Burkina Faso, and the administrative, communications, cultural and economic centre of the nation. It has a population of 2,415,266 in 2019.
    source_title: Ouagadougou
    source_url: https://en.wikipedia.org/wiki/Ouagadougou
    wikidata: Q3777
    retrieved: "2026-07-20"
  - key: bg:sofia
    blurb: Sofia is the capital and largest city of Bulgaria. It is situated in the Sofia Valley at the foot of the Vitosha mountain, in the western part of the country.

# Cities dataset — population-ranked world cities for city→country recognition quiz
# Schema:
#   key: <iso2-lowercase>:<city-slug> — collision-safe unique identifier
#   name: English exonym (name GeoGuessr players would use)
#   country: ISO2 uppercase code (must exist in seeds/tlds.yaml)
#   population: approximate metro or city population (integer, thousands; used for ordering)
# Coverage rule: Every country with real GeoGuessr Street View has 2–3 largest cities.
# Globally famous/GeoGuessr-recognizable cities included even if mid-sized (e.g., Reykjavik).
# Omit disputed territories; use current common English names.

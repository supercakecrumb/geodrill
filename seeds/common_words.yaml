# Common GeoGuessr words per language. Audited against the ingested Tatoeba
# corpus (internal/topics/words/audit_test.go, TestAuditWordsAgainstCorpus,
# WORDS_AUDIT_DATABASE_URL) — 136 -> 79 entries after pruning. See that test's
# doc comment for the frequency-floor/collision methodology, and the
# corresponding "Add corpus audit + prune common-words seed" commit message
# for the full per-duplicate resolution report.
#
# The 9 exact-spelling cross-language duplicates flagged for resolution were
# each checked against real corpus frequency in both claimed languages:
#   - avenida (spa/por), булевард (bul/mkd), проспект (rus/ukr), nord
#     (fra/ron), ulica (pol/slk), дорога (rus/ukr), mesto (slk/slv): neither
#     side's corpus frequency was >=10x the other's (or both were
#     unattested) -> dropped from BOTH languages (ambiguous either way).
#   - gata (isl/swe): attested in Icelandic (swe unattested) -> kept isl only.
#   - затворено (bul/srp): attested in Serbian (bul unattested) -> kept srp only.
# Two further collisions turned up by the automated 10x check (not on the
# original list of 9): spa "sur" (collides with a very common French
# preposition) and slv "pot" (collides with unrelated common verb forms in
# Catalan/Romanian) — both dropped.
topic: languages/common-words

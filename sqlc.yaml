version: "2"
sql:
  - engine: "postgresql"
    schema:
      - "migrations/000001_init.up.sql"
      - "migrations/000002_add_label_style.up.sql"
      - "migrations/000003_add_review_practice.up.sql"
      - "migrations/000004_add_reminder_config.up.sql"
    queries: "internal/storage/query"
    gen:
      go:
        package: "db"
        out: "internal/storage/db"
        sql_package: "pgx/v5"
        emit_json_tags: false
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
              pointer: true

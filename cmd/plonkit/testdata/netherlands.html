5mcng4k8) with a red band and a pointed top. A difference with French bollards is that the red wrap usually does not go all the way around the bollard."]}, "tags": ["bollard"]}, {"kind": "tip", "id": "qzbi", "data": {"image": {"imageUrl": "/images/netherlands/Lack_of_utility_poles.png", "imageLink": "https://goo.gl/maps/QyQkNvZxF6immhQp7", "alt": "", "width": 0.5}, "text": ["The Netherlands usually **does not have any utility poles**. You might see larger power lines like the ones shown in the image, but essentially never any street-level smaller utility poles.", "NOTE: Belgium does use utility poles somewhat commonly."]}, "tags": ["pole"]}]}, {"kind": "tip", "title": "Regional and province-specific clues", "items": [{"kind": "tip", "id": "PKNI", "data": {"image": {"imageUrl": "/images/netherlands/Hectometer_roads_with_attribution.png", "imageLink": "/images/netherlands/Hectometer_roads_with_attribution.png", "alt": "", "width": 0.573}, "text": ["Some road markers (“**hectometre markers**”) have province-specific designs. This only applies to markers for regional N-roads, which have road numbers in yellow boxes.", "Not all N-road markers have province-specific designs: some just have a generic design that can be found nationwide.", "The A-roads all have the same signs and are recognizable because the road number is in a red box.", "Bollards sometimes feature **kilometre stickers**, which are also limited to specific regions.", "_You can click on the image to enlarge it. Image provided by Timzkii._"]}, "tags": ["bollard"]}]}, {"kind": "tip", "title": "Spotlight", "items": [{"kind": "tip", "id": "ABWw", "data": {"image": {"imageUrl": "/images/netherlands/Amsterdam_street_sign.png", "imageLink": "https://goo.gl/maps/Zr994hrmEmv4YoFc9", "alt": "", "width": 0.573}, "text": ["**Amsterdam street signs** feature the city district in a smaller font size below the actual street name.", "NOTE: This design is very uncommon in the rest of the Netherlands."]}}]}, {"kind": "map",

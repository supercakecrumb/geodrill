name: Release

# Triggered by pushing a tag matching "v*": builds + pushes
# ghcr.io/supercakecrumb/geodrill, then creates a GitHub Release.
#
# Release-notes strategy (same approach as engram/.github/workflows/release.yml,
# documented there): extract the tag's version section verbatim from
# CHANGELOG.md, which the release process is expected to have populated via
# `changie batch <version>` + `changie merge` BEFORE the tag was pushed.
#
# Every GHCR/login/push step is guarded with `if: ${{ !env.ACT }}` so `act`
# can validate the rest of this workflow without real registry credentials.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout geodrill
        uses: actions/checkout@v7

      - name: Log in to GHCR
        if: ${{ !env.ACT }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: ${{ !env.ACT }}
        uses: docker/setup-buildx-action@v4

      - name: Build and push image
        if: ${{ !env.ACT }}
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/supercakecrumb/geodrill:${{ github.ref_name }}
            ghcr.io/supercakecrumb/geodrill:latest

      - name: Extract release notes from CHANGELOG.md
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          awk -v ver="$VERSION" '
            $0 ~ "^## " ver { found=1; next }
            found && /^## / { found=0 }
            found { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "::error::No CHANGELOG.md section found for tag $VERSION. Run \`changie batch $VERSION\` and \`changie merge\`, commit that, then tag." >&2
            exit 1
          fi
          cat release_notes.md

      - name: Create GitHub Release
        if: ${{ !env.ACT }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file release_notes.md

services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-geodrill}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-geodrill}
      POSTGRES_DB: ${POSTGRES_DB:-geodrill}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      # postgres:18 stores data in a major-version subdirectory, so the mount
      # goes at /var/lib/postgresql (NOT .../data) — see docker-library/postgres#37.
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-geodrill} -d ${POSTGRES_DB:-geodrill}"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN:?set TELEGRAM_TOKEN in .env}
      DATABASE_URL: ${DATABASE_URL:-postgres://geodrill:geodrill@db:5432/geodrill?sslmode=disable}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      FSRS_RETENTION: ${FSRS_RETENTION:-}
      # snagbox /feedback reporting (optional; unset → /feedback replies "not available").
      SNAGBOX_URL: ${SNAGBOX_URL:-}
      SNAGBOX_INGEST_TOKEN: ${SNAGBOX_INGEST_TOKEN:-}
    restart: unless-stopped

  ingest:
    build: .
    entrypoint: ["/app/ingest"]
    profiles: ["ingest"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://geodrill:geodrill@db:5432/geodrill?sslmode=disable}
      LOG_LEVEL: ${LOG_LEVEL:-info}

volumes:
  pgdata:

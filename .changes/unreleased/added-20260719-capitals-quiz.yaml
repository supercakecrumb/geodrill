kind: Added
body: "New capitals quiz, both directions as two independently-tracked topics under Countries → Capitals: \"What's the capital of 🇨🇴 Colombia?\" (type the capital city, with autocomplete capital suggestions) and \"🏛 Bogotá is the capital of which country?\" (type the country, with the existing autocomplete country suggestions). 242 countries with a capital; multi-capital countries (South Africa, Bolivia, Tanzania, ...) accept every listed capital as a correct answer on the country→capital side, while capital→country only ever asks about each country's primary capital to avoid ambiguity."

kind: Added
body: >-
  GeoGuessr-only mode — a per-user /settings toggle (🌍 GeoGuessr-only, default
  on) that hides every country without Street View coverage everywhere: study,
  reviews, /stats counts and accuracy, tier boundaries, MCQ distractors, and
  autocomplete suggestions. Language topics drop languages not spoken in any
  covered country (with a conservative "keep what we can't determine" rule).
  Coverage is precomputed per item at ingest (items.gg_relevant); toggling the
  setting rebuilds tier gating immediately.

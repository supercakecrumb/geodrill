kind: Added
body: "New flags quiz under a Flags root: guess-the-flag shows a flag photo (or an emoji-prefixed text fallback when no asset is ingested yet for that item) and asks for the country by autocomplete-typed name, plus a set-choice mode for 10 visually-confusable flag groups (Chad/Romania, Indonesia/Monaco/Poland, Netherlands/Luxembourg, ...) where a randomly-picked member's flag is shown and you pick which country set it could belong to. 228 single countries (including GB's England/Scotland/Wales subdivisions) plus 10 confusable groups (24 countries) — every seeds/flags.yaml entry accounted for. A new cmd/flagassets command ingests the local flag PNG cache into media_files (sha256 + dimensions, idempotent by local_path); photo sends now cache the Telegram file_id after first upload and reuse it on later sends instead of re-uploading from disk."

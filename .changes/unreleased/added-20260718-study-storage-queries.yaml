kind: Added
body: 'Add additive v2 storage queries/methods for internal/study (wave 4 wiring): users.daily_intro_cap get/set (IntroCapStore), an atomic single-use introduction-answer guard (AnswerIntroductionOnce) plus GetIntroductionByID, a one-shot mode-aware exercise insert (InsertExerciseV2) plus GetExerciseByIDV2/GetOpenExerciseV2ByMode, a bridge content lookup (GetContentByKindKey), topic-subtree progress aggregation (RecomputeTopicProgress, ListDistinctTiersUnderTopic, RecomputeTopicTierBreakdown) for the /topics browser, and a WithTxStore convenience wrapper over the existing transaction seam'

kind: Changed
body: "Special characters and common-words quizzes now draw distractors from the same guess-the-language language family (romance, slavic-cyrillic, slavic-latin, nordic, cjk, se-asia, malay-indonesian, indian-scripts — seeds/decks.yaml) instead of merely the same script: script alone was already enough to keep a Cyrillic question off Latin/CJK options, but a Latin-script question could still land on any unrelated Latin-script family (e.g. a Polish item offering a Vietnamese or Icelandic option, since romance/slavic-latin/nordic/se-asia all share the \"latin\" script). Distractors are now close by language family in both topics."

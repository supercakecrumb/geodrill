kind: Removed
body: 'Delete internal/train and internal/storage/engramstore -- study.Service (extended with the last two waves'' /practice, /stats, and reminder ports) is now the sole exercise/answer/stats engine, and cmd/bot no longer constructs a legacy trainer at all. No user-visible behavior change: every command this port touched already stopped depending on the legacy trainer in earlier commits this wave. Mark/DecorateLabel/DataNoop moved into internal/telegram (their only remaining user) and the CardFields<->CardState converters plus the review-log query moved into internal/study (ditto) before the packages were deleted'

kind: Added
body: "New country → language quiz under Countries → Profiles: \"What language do you see on signs in 🇰🇪 Kenya?\" (single-choice, 247 countries). Wrong options are drawn only from other countries in the SAME geographic region (19-value region taxonomy), and never include a language that's also spoken in the target country itself — even when a same-region country's primary language happens to be one of the target's own secondary languages (a real, common case with shared colonial languages). main_religion and region are also seeded as facts now (for future sibling quizzes), alongside the multi-valued languages_spoken fact this quiz reads."
